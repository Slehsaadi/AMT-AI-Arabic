<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMT-AI — اختبار الذاكرة الذاتية بالتعليمات المتناوبة</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
/* Styles inchangés sauf pour timer */
.timer-ring-wrap { display:none; } /* cache le timer pour le participant */
</style>
</head>
<body>
<header class="app-header">
  <div class="title-block">
    <h1>اختبار الذاكرة الذاتية بالتعليمات المتناوبة</h1>
    <p>AMT-AI · Adaptation arabe : Saadi (2026)</p>
  </div>
  <div class="header-badge">AMT-AI v1.0</div>
</header><!-- Ecran stimulus --><div id="screen-stimulus" class="screen active">
  <div id="stimulus-word" class="stimulus-word">—</div>
  <div class="response-area">
    <textarea id="response-text" placeholder="اكتب ما قاله المشارك هنا..."></textarea>
    <div class="coding-row">
      <button class="code-btn" data-code="S" onclick="setCode(this,'S')">✦ ذكرى محددة</button>
      <button class="code-btn" data-code="G" onclick="setCode(this,'G')">◉ ذكرى تصنيفية</button>
      <button class="code-btn" data-code="F" onclick="setCode(this,'F')">✕ فشل / لا يتذكر</button>
      <button class="code-btn" data-code="O" onclick="setCode(this,'O')">? استجابة أخرى</button>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="nextWord(true)">تخطّي ←</button>
    <button class="btn btn-primary" onclick="nextWord(false)">تسجيل والانتقال ←</button>
  </div>
</div><script>
const WORDS = ["سعيد","خائف","هادئ","غاضب","مفعم بالطاقة","فشل","مرتاح","وحيد","محبوب","قَلِق","فَرِح","حزين","أمل","يائس","نجاح","آسِف","لقب","مكتبة","حلّ","غامض","ممارسة","بحر","طفل","روح"];
const INSTRS = ["S","G","S","G","S","G","S","G","S","G","S","G","S","G","S","G","S","G","S","G","S","G","S","G"];
let idx = 0;
let code = null;
let results = [];
let dur = 60*1000; // 60 secondes

function renderWord(){
  if(idx >= WORDS.length){
    alert('Fin du test');
    return;
  }
  document.getElementById('stimulus-word').textContent = WORDS[idx];
  document.getElementById('response-text').value='';
  code=null;

  // Timer invisible pour passer au mot suivant automatiquement
  setTimeout(() => {
    nextWord(true);
  }, dur);
}

function setCode(btn,c){
  code=c;
  document.querySelectorAll('.code-btn').forEach(b=>b.classList.remove('selected-specific','selected-generic','selected-fail','selected-other'));
  const m={S:'selected-specific',G:'selected-generic',F:'selected-fail',O:'selected-other'};
  btn.classList.add(m[c]);
}

function nextWord(skipped){
  results.push({
    num: idx+1,
    word: WORDS[idx],
    instruction: INSTRS[idx],
    code: code||(skipped?'F':'—'),
    response: document.getElementById('response-text').value.trim(),
    skipped: skipped
  });
  idx++;
  renderWord();
}

// Démarrage
renderWord();
</script></body>
</html>
